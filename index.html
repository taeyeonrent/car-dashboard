<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>재고현황판</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f2f7;color:#1c1c2e;font-size:14px;}

.topbar{background:#fff;border-bottom:1px solid #e8e8f0;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap;}
.app-title{font-size:17px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap;}
.last-update{font-size:11px;color:#bbb;}

.connect-bar{background:#fff;border-bottom:1px solid #eee;padding:10px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.connect-bar label{font-size:12px;color:#888;}
.connect-bar input{padding:7px 12px;font-size:13px;font-family:inherit;border:1.5px solid #e8e8f0;border-radius:8px;background:#fafafa;color:#1c1c2e;}
.connect-bar input:focus{outline:none;border-color:#6C63FF;}
#sheetIdInput{width:280px;}
#sheetNameInput{width:140px;}
.btn-load{padding:7px 16px;background:#6C63FF;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;}
.btn-load:hover{background:#574fd6;}
#statusMsg{font-size:12px;}

main{max-width:1100px;margin:0 auto;padding:20px 28px 60px;}

.summary-row{display:grid;grid-template-columns:1fr 1.4fr;gap:10px;margin-bottom:14px;}
.sum-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #ebebf5;}
.sum-label{font-size:11.5px;color:#999;margin-bottom:6px;}
.sum-value{font-size:28px;font-weight:700;line-height:1.2;}
.sum-unit{font-size:12px;font-weight:500;color:#aaa;margin-left:3px;}
.split-row{display:flex;gap:22px;}
.split-item .sum-value{font-size:22px;}
.split-sep{width:1px;background:#eee;}
.split-sub{font-size:11px;color:#999;margin-top:3px;}

.card{background:#fff;border-radius:10px;padding:14px;border:1px solid #ebebf5;margin-bottom:12px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;}
.card-title{font-size:13.5px;font-weight:700;}
.card-sub{font-size:11.5px;color:#999;margin-top:2px;}

.seg-toggle{display:flex;background:#f0f0f8;border-radius:7px;padding:3px;}
.seg-btn{padding:6px 15px;border-radius:5px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;border:none;background:transparent;color:#888;transition:all .15s;}
.seg-btn.active{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.1);font-weight:600;}

table.inv-table{width:100%;border-collapse:collapse;font-size:13px;}
.inv-table th{text-align:center;padding:7px 6px;color:#999;font-weight:600;font-size:12.5px;}
.inv-table th:first-child{text-align:left;}
.inv-table td{text-align:center;padding:9px 6px;border-top:1px solid #f5f5fa;}
.inv-table td:first-child{text-align:left;font-weight:600;cursor:pointer;font-size:13.5px;}
.inv-table td.emph{font-size:15px;font-weight:700;}
.inv-table tr.model-row:hover td:first-child{color:#6C63FF;}
.inv-table tr.model-row.open td:first-child{color:#6C63FF;}
.detail-cell{padding:0 !important;border-top:none !important;}
.detail-box{padding:14px 16px 16px 20px;border-radius:0 0 6px 6px;}
.detail-label{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;}
.detail-stats{display:flex;gap:14px;font-size:12.5px;color:#555;flex-wrap:wrap;}
.detail-stats b{color:#1c1c2e;}

.pivot-table{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border-radius:8px;overflow:hidden;}
.pivot-table thead tr{background:#eeecff;}
.pivot-table th{padding:9px 14px;font-weight:700;color:#555;text-align:center;}
.pivot-table th:first-child{text-align:left;}
.pivot-table td{padding:9px 14px;text-align:center;border-top:1px solid #f0f0f5;}
.pivot-table td:first-child{text-align:left;font-weight:600;}
.pivot-table td.total-col, .pivot-table th.total-col{border-left:1px solid #e3e0ff;font-weight:700;color:#6C63FF;}
.pivot-table td.zero{color:#ccc;}

.arrow-cell{white-space:nowrap;}
.arrow-cell b{color:#6C63FF;}

.empty-state{padding:50px;text-align:center;color:#aaa;font-size:13px;}
footer{text-align:center;color:#bbb;font-size:11px;padding:20px;}
@media(max-width:700px){.summary-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">📦 재고현황판</div>
  <div class="last-update" id="lastUpdate"></div>
</div>

<div class="connect-bar">
  <label>시트 ID</label>
  <input id="sheetIdInput" placeholder="구글 스프레드시트 ID" value="14j3hDW3Hn-1ftkJlqZhEZhWTt38eZU8S4yMoadenrR4">
  <label>탭 이름</label>
  <input id="sheetNameInput" placeholder="예: 자산관리" value="차량 RAW DATA">
  <label>탁송 탭</label>
  <input id="shipSheetNameInput" placeholder="예: 탁송데이터" value="탁송데이터" style="width:120px;">
  <label>판매 탭</label>
  <input id="salesSheetNameInput" placeholder="예: 판매현황테스트" value="판매현황테스트" style="width:130px;">
  <button class="btn-load" onclick="loadAll()">불러오기</button>
  <span id="statusMsg"></span>
</div>

<main>
  <div id="content"><div class="empty-state">불러오는 중...</div></div>
</main>

<footer>재고현황판 · 원본 차량데이터 기준 · 분류/집계는 브라우저에서 자동 계산</footer>

<script>
window.addEventListener('DOMContentLoaded', () => {
  if(document.getElementById('sheetIdInput').value.trim()) loadAll();
});
</script>

<script>
// ===== 분류 기준 (여기 값만 바꾸면 기준 조정 가능) =====
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const REG_CUTOFF = new Date(2026,5,1); // 2026-06-01 : 이 날짜 이후 상품등록 = 정상재고

const SHIN_TOTAL = new Set(["구매완료","상품준비","상품화진행중","상품화완료","상품"]);
const SHIN_AGE   = new Set(["상품준비","상품화진행중","상품화완료","상품"]); // 구매완료는 총재고엔 포함, 장기/반장기/정상 판정 대상 아님
const REJA_SET   = new Set(["상품준비","상품화진행중","상품화완료","상품"]);
const REJU_SET   = new Set(["구매준비중","상품준비","상품화진행중","상품화완료","상품"]);

function parseYMD(s){
  if(!s) return null;
  const m = String(s).match(/(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if(!m) return null;
  return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
}
function daysSince(d){ return Math.round((TODAY - d) / 86400000); }

let rows = null; // classified: {gubun, name, grade, year, fuel}
let shipRows = null; // {gubun, name} from 탁송데이터
let salesRows = null; // {gubun, name, monthKey} from 판매현황테스트 (계약실행일 기준)
let rejaMode = '자사매입';
let openShin = null, openReja = null;

function setStatus(msg, isErr){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.style.color = isErr ? '#e2483d' : '#22c997';
}

async function loadAll(){
  const id = document.getElementById('sheetIdInput').value.trim();
  const sheetName = document.getElementById('sheetNameInput').value.trim() || '자산관리';
  if(!id){ setStatus('시트 ID를 입력해주세요.', true); return; }
  setStatus('불러오는 중...', false);
  try{
    const url = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const text = await res.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if(!m) throw new Error(`시트를 찾을 수 없어요. 탭 이름 "${sheetName}"이 맞는지 확인해주세요.`);
    const json = JSON.parse(m[1]);
    if(!json.table || !json.table.rows || !json.table.rows.length) throw new Error('데이터가 비어있어요.');

    const cols = json.table.cols.map(c=>c.label);
    const idx = n => cols.findIndex(c=>c && c.includes(n));
    const iBuy=idx('매입구분'), iPDate=idx('매입계약일'), iStatus=idx('자산상태'),
          iRDate=idx('상품등록일'), iNewcar=idx('신차구분'), iName=idx('시리즈명'),
          iYear=idx('년형'), iFuel=idx('유종');

    if(iBuy<0||iPDate<0||iStatus<0||iNewcar<0||iName<0){
      throw new Error('필요한 컬럼(매입구분/매입계약일/자산상태/신차구분/시리즈명)을 찾을 수 없어요. 헤더명을 확인해주세요.');
    }

    const raw = json.table.rows.map(r=>{
      const c = r.c;
      const v = i => (i>=0 && c[i] && c[i].v!=null) ? c[i].v : '';
      return {
        buy:v(iBuy), pdate:v(iPDate), status:v(iStatus), rdate:v(iRDate),
        newcar:v(iNewcar), name:v(iName), year:v(iYear), fuel:v(iFuel)
      };
    });

    rows = [];
    raw.forEach(r=>{
      if(!r.name) return;
      let gubun = null, grade = '';
      if(r.newcar==='신차' && SHIN_TOTAL.has(r.status)){
        gubun = '신차';
        if(SHIN_AGE.has(r.status)){
          const pd = parseYMD(r.pdate);
          if(pd){
            const d = daysSince(pd);
            grade = d>=60 ? '장기' : d>=30 ? '반장기' : '정상';
          }
        }
      } else if(r.newcar==='재렌트' && r.buy==='자사매입' && REJA_SET.has(r.status)){
        gubun = '재렌트-자사매입';
        if(r.status==='상품'){
          const rd = parseYMD(r.rdate);
          if(rd) grade = rd < REG_CUTOFF ? '장기' : '정상';
        }
      } else if(r.newcar==='재렌트' && r.buy==='중고매입' && REJU_SET.has(r.status)){
        gubun = '재렌트-중고매입';
        if(r.status==='상품'){
          const rd = parseYMD(r.rdate);
          if(rd) grade = rd < REG_CUTOFF ? '장기' : '정상';
        }
      }
      if(gubun) rows.push({gubun, name:r.name, grade, year:r.year, fuel:r.fuel});
    });

    // 탁송데이터(이번달 출고) 함께 로드 - 실패해도 재고 표시는 계속 진행
    let shipStatus = '';
    const shipSheetName = document.getElementById('shipSheetNameInput').value.trim() || '탁송데이터';
    try{
      const shipUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(shipSheetName)}`;
      const shipRes = await fetch(shipUrl);
      const shipText = await shipRes.text();
      const sm = shipText.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      if(!sm){ shipStatus = ` / 탁송 탭("${shipSheetName}") 못 찾음`; }
      else{
        const shipJson = JSON.parse(sm[1]);
        if(shipJson.table && shipJson.table.rows){
          const scols = shipJson.table.cols.map(c=>c.label);
          const sidx = n => scols.findIndex(c=>c && c.includes(n));
          const iSGubun=sidx('신차구분'), iSName=sidx('차종'), iSAsset=sidx('자산번호');
          if(iSGubun<0 || iSName<0){
            shipStatus = ` / 탁송 탭에서 "신차구분"·"차종" 컬럼을 못 찾음`;
          } else {
            shipRows = shipJson.table.rows.map(r=>{
              const c=r.c;
              const v = i => (i>=0 && c[i] && c[i].v!=null) ? c[i].v : '';
              return { gubun:v(iSGubun), name:v(iSName), asset:v(iSAsset) };
            }).filter(r=>r.asset && r.name);
            shipStatus = ` / 이번달출고 ${shipRows.length}건`;
          }
        } else {
          shipStatus = ` / 탁송 탭 데이터 없음`;
        }
      }
    }catch(e){ shipStatus = ` / 탁송데이터 로드 오류(${e.message})`; }

    // 판매현황테스트(계약실행일 기준 월별 이력) 로드 - 최근평균/전년동월 비교용
    let salesStatus = '';
    const salesSheetName = document.getElementById('salesSheetNameInput').value.trim() || '판매현황테스트';
    try{
      const salesUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(salesSheetName)}`;
      const salesRes = await fetch(salesUrl);
      const salesText = await salesRes.text();
      const lm = salesText.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
      if(!lm){ salesStatus = ` / 판매 탭("${salesSheetName}") 못 찾음`; }
      else{
        const salesJson = JSON.parse(lm[1]);
        if(salesJson.table && salesJson.table.rows){
          const lcols = salesJson.table.cols.map(c=>c.label);
          const lidx = n => lcols.findIndex(c=>c && c.includes(n));
          let iLDate=lidx('계약실행일'), iLName=lidx('차종');
          let iLGubun=lidx('상품구분');
          if(iLGubun<0) iLGubun=lidx('신차구분');
          if(iLDate<0 && lcols.length>31) iLDate=31; // 헤더명이 안 잡히면 AF열(0-idx 31)을 계약실행일로 간주
          if(iLDate<0 || iLName<0){
            salesStatus = ` / 판매 탭에서 "계약실행일"·"차종" 컬럼을 못 찾음`;
          } else {
            salesRows = salesJson.table.rows.map(r=>{
              const c=r.c;
              const v = i => (i>=0 && c[i] && c[i].v!=null) ? c[i].v : '';
              const d = parseYMD(v(iLDate));
              return d ? { gubun:v(iLGubun), name:v(iLName), monthKey: d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0') } : null;
            }).filter(r=>r && r.name);
            salesStatus = ` / 판매이력 ${salesRows.length}건${iLGubun<0 ? ' (신차구분 컬럼 없어 신차/재렌트 구분 없이 합산)' : ''}`;
          }
        } else {
          salesStatus = ` / 판매 탭 데이터 없음`;
        }
      }
    }catch(e){ salesStatus = ` / 판매이력 로드 오류(${e.message})`; }

    shipStatus += salesStatus;
    document.getElementById('lastUpdate').textContent = '마지막 업데이트: ' + new Date().toLocaleString('ko-KR');
    setStatus(`불러오기 완료 (재고 ${rows.length}건 / 원본 ${raw.length}행)${shipStatus}`, false);

    render();
  }catch(e){
    setStatus('오류: '+e.message, true);
  }
}

// 2026년 대한민국 공휴일 (제헌절 부활 반영, 대체공휴일 포함)
const HOLIDAYS_2026 = new Set([
  '2026-01-01', // 신정
  '2026-02-16','2026-02-17','2026-02-18', // 설날 연휴
  '2026-03-01', // 삼일절
  '2026-03-02', // 대체공휴일(삼일절)
  '2026-05-01', // 노동절
  '2026-05-05', // 어린이날
  '2026-05-24', // 부처님오신날
  '2026-05-25', // 대체공휴일(부처님오신날)
  '2026-06-03', // 전국동시지방선거(임시공휴일)
  '2026-06-06', // 현충일
  '2026-07-17', // 제헌절 (2026년부터 공휴일 재지정)
  '2026-08-15', // 광복절
  '2026-08-17', // 대체공휴일(광복절)
  '2026-09-24','2026-09-25','2026-09-26', // 추석 연휴
  '2026-10-03', // 개천절
  '2026-10-05', // 대체공휴일(개천절)
  '2026-10-09', // 한글날
  '2026-12-25', // 성탄절
]);
function fmtDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function getBusinessDays(){
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  let total=0, elapsed=0;
  for(let t=first.getTime(); t<=last.getTime(); t+=86400000){
    const d = new Date(t);
    const day = d.getDay();
    const isHoliday = HOLIDAYS_2026.has(fmtDate(d));
    if(day!==0 && day!==6 && !isHoliday){
      total++;
      if(d.getTime() <= now.getTime()) elapsed++;
    }
  }
  return {elapsed, total, pct: total? Math.round(elapsed/total*100) : 0};
}

function monthsAgoKey(n){
  const d = new Date(TODAY.getFullYear(), TODAY.getMonth()-n, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function salesCountFor(gubunFilter, name, monthKey){
  if(!salesRows) return 0;
  return salesRows.filter(r=>{
    if(r.name!==name) return false;
    if(r.monthKey!==monthKey) return false;
    if(r.gubun) return r.gubun===gubunFilter; // 신차구분 있으면 매칭, 없으면(공백) 전체 합산
    return true;
  }).length;
}
function recentAvg(gubunFilter, name, monthsBack){
  let sum=0;
  for(let i=1;i<=monthsBack;i++){ sum += salesCountFor(gubunFilter, name, monthsAgoKey(i)); }
  return monthsBack>0 ? sum/monthsBack : 0;
}
function sameMonthLastYear(gubunFilter, name){
  const d = new Date(TODAY.getFullYear()-1, TODAY.getMonth(), 1);
  const key = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  return salesCountFor(gubunFilter, name, key);
}

function shipCount(gubunFilter, name){
  if(!shipRows) return null;
  return shipRows.filter(r=> r.gubun===gubunFilter && r.name===name).length;
}

function groupByModel(arr){
  const map = {};
  arr.forEach(r=>{
    if(!map[r.name]) map[r.name] = {name:r.name, total:0, long:0, mid:0, normal:0, prep:0, items:[]};
    const g = map[r.name];
    g.total++; g.items.push(r);
    if(r.grade==='장기') g.long++;
    else if(r.grade==='반장기') g.mid++;
    else if(r.grade==='정상') g.normal++;
    else g.prep++; // 등급 미분류 = 상품준비/상품화진행중/상품화완료/구매준비중
  });
  return Object.values(map).sort((a,b)=>b.total-a.total);
}

function breakdown(items){
  const byYear = {}; // { year: { fuel: count, __total: n } }
  const fuelSet = new Set();
  items.forEach(r=>{
    const y = r.year || '년형미상';
    const f = r.fuel || '유종미상';
    if(!byYear[y]) byYear[y] = {__total:0};
    byYear[y].__total++;
    byYear[y][f] = (byYear[y][f]||0)+1;
    fuelSet.add(f);
  });
  return {byYear, fuels: Array.from(fuelSet)};
}

function detailHtml(m, colspan, shipGubun, showSales, hasM){
  const {byYear, fuels} = breakdown(m.items);
  const years = Object.keys(byYear).sort();
  const pivotRows = years.map(y=>{
    const data = byYear[y];
    const cells = fuels.map(f=>{
      const v = data[f]||0;
      return `<td class="${v===0?'zero':''}">${v===0?'-':v}</td>`;
    }).join('');
    return `<tr><td>${y}</td>${cells}<td class="total-col">${data.__total}</td></tr>`;
  }).join('');
  const pivotTable = years.length ? `
    <table class="pivot-table">
      <thead><tr><th>년형</th>${fuels.map(f=>`<th>${f}</th>`).join('')}<th class="total-col">계</th></tr></thead>
      <tbody>${pivotRows}</tbody>
    </table>` : '<span style="color:#bbb;font-size:12.5px;">년형 정보 없음</span>';

  const gradeParts = [`장기 <b>${m.long}</b>`];
  if(hasM) gradeParts.push(`반장기 <b>${m.mid}</b>`);
  gradeParts.push(`정상 <b>${m.normal}</b>`);
  if(!hasM) gradeParts.push(`상품화진행중 <b>${m.prep}</b>`);
  const gradeLine = gradeParts.join(' · ');

  let salesLine = '';
  if(showSales){
    const avg3 = recentAvg(shipGubun, m.name, 3).toFixed(1);
    const lastYear = sameMonthLastYear(shipGubun, m.name);
    salesLine = `<div style="font-size:12.5px;color:#888;margin-top:12px;">최근3개월평균 <b style="color:#1c1c2e;">${avg3}</b> · 작년동월 <b style="color:#1c1c2e;">${lastYear}</b></div>`;
  }

  return `<tr><td colspan="${colspan}" class="detail-cell">
    <div class="detail-box">
      <div class="detail-label">재고 등급</div>
      <div style="font-size:12.5px;color:#555;margin-bottom:14px;">${gradeLine}</div>
      <div class="detail-label">년형별 유종 구성</div>
      ${pivotTable}
      ${salesLine}
    </div>
  </td></tr>`;
}

function renderTable(models, openName, onClick, hasM, shipGubun){
  const showShip = !!shipRows;
  const showSales = !!salesRows;
  const biz = showShip ? getBusinessDays() : null;
  const cols = hasM
    ? ['차종','총재고','장기','반장기','정상']
    : ['차종','총재고','상품화진행중','장기','정상'];
  let colsWithShip = cols;
  if(showShip) colsWithShip = [...colsWithShip, '이번달→마감예상 출고', '마감예상재고'];
  if(showShip && hasM) colsWithShip = [...colsWithShip, '구매필요대수'];

  const rowsHtml = models.map(m=>{
    const isOpen = m.name===openName;
    const cells = hasM
      ? `<td class="emph">${m.total}</td><td style="color:#e2483d;">${m.long}</td><td style="color:#d98a10;">${m.mid}</td><td style="color:#1aab73;">${m.normal}</td>`
      : `<td class="emph">${m.total}</td><td>${m.prep}</td><td style="color:#e2483d;">${m.long}</td><td style="color:#1aab73;">${m.normal}</td>`;
    let midCell = '', tailCell = '';
    let projStock = null;
    if(showShip){
      const sc = shipCount(shipGubun, m.name);
      const proj = (biz.elapsed>0) ? Math.round(sc/biz.elapsed*biz.total) : sc;
      projStock = Math.max(0, m.total - proj);
      midCell = `<td class="arrow-cell">${sc} → <b>${proj}</b></td><td class="emph">${projStock}</td>`;
    }
    let expectedDemand = null;
    if(showSales){
      expectedDemand = recentAvg(shipGubun, m.name, 3);
    }
    if(showShip && hasM){
      const basis = expectedDemand!=null ? expectedDemand : (biz.elapsed>0 ? shipCount(shipGubun,m.name)/biz.elapsed*biz.total : shipCount(shipGubun,m.name));
      const buyNeed = Math.max(0, Math.round(basis - projStock));
      const buyStyle = buyNeed>0 ? 'font-weight:700;color:#e2483d;font-size:15px;' : 'color:#999;';
      tailCell = `<td style="${buyStyle}">${buyNeed>0?'+':''}${buyNeed}</td>`;
    }
    let html = `<tr class="model-row ${isOpen?'open':''}" onclick="${onClick}('${m.name.replace(/'/g,"\\'")}')">
      <td>${m.name}${isOpen?' ▾':' ▸'}</td>${cells}${midCell}${tailCell}
    </tr>`;
    if(isOpen){ html += detailHtml(m, colsWithShip.length, shipGubun, showSales, hasM); }
    return html;
  }).join('');
  return `<table class="inv-table">
    <thead><tr>${colsWithShip.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
    <tbody>${rowsHtml || `<tr><td colspan="${colsWithShip.length}" style="text-align:center;color:#aaa;">데이터 없음</td></tr>`}</tbody>
  </table>`;
}

function toggleShin(name){ openShin = (openShin===name)? null : name; render(); }
function toggleReja(name){ openReja = (openReja===name)? null : name; render(); }
function setRejaMode(mode){ rejaMode = mode; openReja = null; render(); }

function render(){
  if(!rows) return;
  const content = document.getElementById('content');

  const shin = rows.filter(r=>r.gubun==='신차');
  const rejaAll = rows.filter(r=>r.gubun==='재렌트-자사매입');
  const rejuAll = rows.filter(r=>r.gubun==='재렌트-중고매입');
  const rejaCurrent = rejaMode==='자사매입' ? rejaAll : rejuAll;

  let shipBadge = '';
  if(shipRows){
    const biz = getBusinessDays();
    shipBadge = ` · 이번달 영업일 진척률 <b style="color:#6C63FF;">${biz.pct}%</b> (${biz.elapsed}일/${biz.total}일) — 마감예상출고는 현재 페이스 비례 추정, 익월대비 구매필요는 마감예상재고가 (판매이력 있으면 최근3개월평균, 없으면 이번달 페이스) 기준 예상수요에 못 미치는 만큼`;
  }

  content.innerHTML = `
    <div class="summary-row">
      <div class="sum-card">
        <div class="sum-label">전체 재고</div>
        <div class="sum-value">${rows.length.toLocaleString()}<span class="sum-unit">대</span></div>
      </div>
      <div class="sum-card split-row">
        <div class="split-item">
          <div class="sum-label">신차</div>
          <div class="sum-value" style="color:#6C63FF;">${shin.length}<span class="sum-unit">대</span></div>
        </div>
        <div class="split-sep"></div>
        <div class="split-item">
          <div class="sum-label">재렌트</div>
          <div class="sum-value" style="color:#22c997;">${(rejaAll.length+rejuAll.length).toLocaleString()}<span class="sum-unit">대</span></div>
          <div class="split-sub">자사 : ${rejaAll.length} &nbsp;/&nbsp; 중고 : ${rejuAll.length}</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><div>
        <div class="card-title">신차 상세</div>
        <div class="card-sub">매입계약일 기준 · D+60↑ 장기 · D+30~59 반장기 · D+29↓ 정상${shipBadge}</div>
      </div></div>
      ${renderTable(groupByModel(shin), openShin, 'toggleShin', true, '신차')}
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">재렌트 상세</div>
          <div class="card-sub">상품등록일 기준 · 2026년 6~7월 정상 · 그 이전 장기${shipBadge}</div>
        </div>
        <div class="seg-toggle">
          <button class="seg-btn ${rejaMode==='자사매입'?'active':''}" onclick="setRejaMode('자사매입')" style="${rejaMode==='자사매입'?'color:#22c997;':''}">자사매입</button>
          <button class="seg-btn ${rejaMode==='중고매입'?'active':''}" onclick="setRejaMode('중고매입')" style="${rejaMode==='중고매입'?'color:#f5a623;':''}">중고매입</button>
        </div>
      </div>
      ${renderTable(groupByModel(rejaCurrent), openReja, 'toggleReja', false, '재렌트')}
    </div>
  `;
}
</script>
</body>
</html>
